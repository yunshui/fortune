name: 综合分析邮件提醒

on:
  schedule:
    # 每天港股交易时段执行 (周一到周五，下午4:00 HK时间)
    - cron: '18 8 * * 1-5'
  # 可选：允许手动触发
  workflow_dispatch:

jobs:
  send-email:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Hong_Kong
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run comprehensive analysis script
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_AUTHCODE: ${{ secrets.EMAIL_AUTHCODE }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          EMAIL_SMTP: ${{ secrets.EMAIL_SMTP }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          QWEN_CHAT_URL: ${{ secrets.QWEN_CHAT_URL }}
          QWEN_CHAT_MODEL: ${{ secrets.QWEN_CHAT_MODEL }}
        run: |
          bash scripts/run_comprehensive_analysis.sh
