name: IPO上市提醒

on:
  schedule:
    # 每天 UTC 时间 0:00 执行（即北京时间 8:00）
    - cron: '0 2 * * *'
  # 可选：允许手动触发
  workflow_dispatch:

jobs:
  send-ipo-email:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Hong_Kong
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 pandas

      - name: Run IPO email script
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_AUTHCODE: ${{ secrets.EMAIL_AUTHCODE }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          EMAIL_SMTP: ${{ secrets.EMAIL_SMTP }}
        run: |
          python hk_ipo_aastocks.py
          
      - name: Check execution status
        if: success()
        run: |
          echo "✅ IPO监控任务执行成功"
          
      - name: Report failure
        if: failure()
        run: |
          echo "❌ IPO监控任务执行失败，请检查日志"
